name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Lint · Build · Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (production)
        run: npm run build

      - name: Verify no third-party scripts in production HTML
        run: |
          if grep -q "cdn.gpteng.co" dist/index.html; then
            echo "ERROR: cdn.gpteng.co script found in production build!"
            exit 1
          fi
          echo "OK: no cdn.gpteng.co in production HTML"

      - name: Run unit tests
        run: npm run test
